<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Meaningful Noise — Instructor View</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: #111;
      border-bottom: 1px solid #1e293b;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    header h1 {
      font-size: 13px;
      font-weight: 500;
      color: #94a3b8;
      letter-spacing: 0.05em;
    }
    #status-bar {
      font-size: 12px;
      color: #4ade80;
      font-family: monospace;
    }

    /* ── Tunnel URL bar ── */
    #tunnel-bar {
      background: #0f172a;
      border-bottom: 1px solid #1e293b;
      padding: 8px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    #tunnel-bar label { font-size: 11px; color: #64748b; white-space: nowrap; }
    #tunnel-input {
      flex: 1;
      min-width: 260px;
      background: #1e293b;
      border: 1px solid #334155;
      color: #e2e8f0;
      padding: 5px 10px;
      border-radius: 5px;
      font-size: 12px;
      font-family: monospace;
    }
    #tunnel-input:focus { outline: none; border-color: #3b82f6; }
    #tunnel-btn {
      background: #1d4ed8;
      color: #fff;
      border: none;
      padding: 5px 14px;
      border-radius: 5px;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
    }
    #tunnel-btn:hover { background: #2563eb; }
    #tunnel-status { font-size: 11px; color: #facc15; min-width: 80px; }

    /* ── Main layout ── */
    main {
      display: flex;
      flex: 1;
      gap: 0;
      overflow: hidden;
    }

    /* ── Left sidebar: controls ── */
    aside {
      width: 280px;
      min-width: 280px;
      background: #0f172a;
      border-right: 1px solid #1e293b;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      overflow-y: auto;
    }

    /* ── Webcam preview ── */
    #webcam-wrap {
      position: relative;
      width: 100%;
      height: 248px;
      background: #111;
      border-radius: 6px;
      overflow: hidden;
    }
    #webcam {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transform: scaleX(-1); /* mirror */
    }
    #webcam-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.6);
      font-size: 13px;
      color: #94a3b8;
    }

    /* ── Buttons ── */
    .btn {
      width: 100%;
      background: #2563eb;
      color: #fff;
      border: none;
      padding: 9px 0;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    }
    .btn:hover { background: #1d4ed8; }
    .btn:disabled { background: #1e3a5f; color: #64748b; cursor: not-allowed; }
    .btn.active { background: #059669; }

    /* ── Form controls ── */
    .field { display: flex; flex-direction: column; gap: 5px; }
    .field-row { display: flex; align-items: center; justify-content: space-between; }
    .field label { font-size: 11px; color: #94a3b8; }
    .field .val { font-size: 11px; color: #60a5fa; font-family: monospace; }
    input[type=range] { width: 100%; accent-color: #3b82f6; cursor: pointer; }
    select {
      width: 100%;
      background: #1e293b;
      border: 1px solid #334155;
      color: #e2e8f0;
      padding: 6px 8px;
      border-radius: 5px;
      font-size: 12px;
      cursor: pointer;
    }
    .prompt-row { display: flex; gap: 6px; }
    .prompt-row input[type=text] {
      flex: 1;
      background: #1e293b;
      border: 1px solid #334155;
      color: #e2e8f0;
      padding: 6px 9px;
      border-radius: 5px;
      font-size: 12px;
    }
    .prompt-row input[type=text]:focus { outline: none; border-color: #3b82f6; }
    .prompt-row button {
      background: #2563eb;
      color: #fff;
      border: none;
      padding: 6px 12px;
      border-radius: 5px;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
    }
    .prompt-row button:hover { background: #1d4ed8; }
    #prompt-feedback { font-size: 11px; color: #facc15; min-height: 16px; }

    .divider { border: none; border-top: 1px solid #1e293b; }

    /* ── Right: output ── */
    .output-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #050505;
      padding: 12px;
    }
    #output {
      max-width: 100%;
      max-height: calc(100vh - 100px);
      aspect-ratio: 1;
      object-fit: contain;
      border-radius: 6px;
      background: #111;
      display: block;
    }
  </style>
</head>
<body>

<header>
  <h1>MEANINGFUL NOISE — Instructor View</h1>
  <span id="status-bar">not connected</span>
</header>

<div id="tunnel-bar">
  <label>Tunnel URL:</label>
  <input type="text" id="tunnel-input"
    placeholder="https://xxxx.trycloudflare.com  (paste your tunnel URL, then click Connect)">
  <button id="tunnel-btn" onclick="setTunnel()">Connect</button>
  <span id="tunnel-status"></span>
</div>

<main>
  <aside>
    <!-- Webcam -->
    <div id="webcam-wrap">
      <video id="webcam" autoplay playsinline muted></video>
      <div id="webcam-overlay">camera off</div>
    </div>
    <button id="cam-btn" class="btn" onclick="startCam()">Start Webcam</button>

    <hr class="divider">

    <!-- Prompt -->
    <div class="field">
      <label>Prompt</label>
      <div class="prompt-row">
        <input type="text" id="prompt-input" value="polar bear">
        <button onclick="sendPrompt()">Update</button>
      </div>
      <div id="prompt-feedback"></div>
    </div>

    <hr class="divider">

    <!-- Noise Influence -->
    <div class="field">
      <div class="field-row">
        <label>Motion Noise Influence</label>
        <span class="val" id="ni-val">1.00</span>
      </div>
      <input type="range" id="noise-influence" min="0" max="1" step="0.05" value="1.0"
        oninput="document.getElementById('ni-val').textContent=parseFloat(this.value).toFixed(2)">
    </div>

    <!-- Temporal Feedback -->
    <div class="field">
      <div class="field-row">
        <label>Temporal Feedback</label>
        <span class="val" id="tf-val">0.50</span>
      </div>
      <input type="range" id="temporal-feedback" min="0" max="1" step="0.05" value="0.5"
        oninput="document.getElementById('tf-val').textContent=parseFloat(this.value).toFixed(2)">
    </div>

    <!-- Noise Mode -->
    <div class="field">
      <label>Noise Mode</label>
      <select id="noise-mode">
        <option value="b" selected>Option B — per-axis (x / y / z / mag)</option>
        <option value="a">Option A — mixed stream</option>
      </select>
    </div>

  </aside>

  <!-- Output -->
  <div class="output-wrap">
    <img id="output" src="" alt="Generated output will appear here">
  </div>
</main>

<script>
// ── Configuration ──────────────────────────────────────────────────────────
// Paste your Cloudflare tunnel URL here and click Connect,
// or hard-code it if using a named (permanent) tunnel.
let TUNNEL_URL = '';

// ── Tunnel setup ───────────────────────────────────────────────────────────
function setTunnel() {
  const raw = document.getElementById('tunnel-input').value.trim().replace(/\/$/, '');
  if (!raw.startsWith('http')) {
    document.getElementById('tunnel-status').textContent = 'invalid URL';
    return;
  }
  TUNNEL_URL = raw;
  document.getElementById('tunnel-status').textContent = 'connecting...';
  // Test the connection
  fetch(TUNNEL_URL + '/status')
    .then(r => r.json())
    .then(d => {
      document.getElementById('tunnel-status').textContent = 'connected';
      document.getElementById('tunnel-status').style.color = '#4ade80';
    })
    .catch(() => {
      document.getElementById('tunnel-status').textContent = 'unreachable';
      document.getElementById('tunnel-status').style.color = '#f87171';
    });
}

// ── Webcam ─────────────────────────────────────────────────────────────────
const canvas = document.createElement('canvas');
canvas.width = 512; canvas.height = 512;
const ctx = canvas.getContext('2d');
let sendInterval = null;

function startCam() {
  if (!TUNNEL_URL) {
    alert('Set the tunnel URL and click Connect first.');
    return;
  }
  navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false })
    .then(stream => {
      const video = document.getElementById('webcam');
      video.srcObject = stream;
      video.onloadedmetadata = () => {
        video.play();
        document.getElementById('webcam-overlay').style.display = 'none';
        document.getElementById('cam-btn').textContent = 'Camera On';
        document.getElementById('cam-btn').classList.add('active');
        document.getElementById('cam-btn').disabled = true;
        sendInterval = setInterval(sendFrame, 500); // 2 fps to server
      };
    })
    .catch(err => {
      document.getElementById('webcam-overlay').textContent = 'Error: ' + err.message;
    });
}

function sendFrame() {
  if (!TUNNEL_URL) return;
  const video = document.getElementById('webcam');
  if (!video.videoWidth) return;

  // Draw mirrored frame to canvas (undo the CSS mirror for the server)
  ctx.save();
  ctx.scale(-1, 1);
  ctx.drawImage(video, -512, 0, 512, 512);
  ctx.restore();

  canvas.toBlob(blob => {
    if (!blob) return;
    const fd = new FormData();
    fd.append('frame', blob, 'frame.jpg');
    fd.append('noise_influence',  document.getElementById('noise-influence').value);
    fd.append('temporal_feedback', document.getElementById('temporal-feedback').value);
    fd.append('option_b', document.getElementById('noise-mode').value === 'b' ? '1' : '0');
    fetch(TUNNEL_URL + '/webcam', { method: 'POST', body: fd }).catch(() => {});
  }, 'image/jpeg', 0.80);
}

// ── Prompt ─────────────────────────────────────────────────────────────────
function sendPrompt() {
  if (!TUNNEL_URL) return;
  const p = document.getElementById('prompt-input').value.trim();
  if (!p) return;
  fetch(TUNNEL_URL + '/prompt', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ prompt: p })
  })
  .then(r => r.json())
  .then(d => {
    const fb = document.getElementById('prompt-feedback');
    fb.textContent = d.status;
    setTimeout(() => { fb.textContent = ''; }, 3000);
  })
  .catch(() => {});
}

// ── Output polling ─────────────────────────────────────────────────────────
let outputErrors = 0;
function refreshOutput() {
  if (!TUNNEL_URL) return;
  const img = new Image();
  img.onload = () => {
    document.getElementById('output').src = img.src;
    outputErrors = 0;
  };
  img.onerror = () => { outputErrors++; };
  img.src = TUNNEL_URL + '/latest.jpg?t=' + Date.now();
}
setInterval(refreshOutput, 300);

// ── Status polling ─────────────────────────────────────────────────────────
function pollStatus() {
  if (!TUNNEL_URL) return;
  fetch(TUNNEL_URL + '/status')
    .then(r => r.json())
    .then(d => {
      const fps = d.fps || 0;
      const n   = d.connected || 0;
      const acc = d.accel != null ? d.accel.toFixed(3) : '0.000';
      document.getElementById('status-bar').textContent =
        (fps ? fps.toFixed(1) + ' fps  |  ' : 'warming up  |  ') +
        n + ' student' + (n !== 1 ? 's' : '') +
        '  |  accel: ' + acc + ' m/s²';
    })
    .catch(() => {});
}
setInterval(pollStatus, 1000);

// Also send prompt on Enter key
document.getElementById('prompt-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') sendPrompt();
});
</script>

</body>
</html>
